stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE

# ============================================================
# BUILD - Docker image → GitLab Container Registry
# ============================================================

build-image:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG="production"
      elif [ "$CI_COMMIT_BRANCH" = "staging" ]; then
        TAG="dev"
      fi
    - docker build --network=host -t $IMAGE_NAME:$TAG -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA -f dockerfile .
    - docker push $IMAGE_NAME:$TAG
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - staging

# ============================================================
# DEPLOY - SSH ke server, pull image, restart container
# Server production & dev = 1 mesin (beda port & container)
# ============================================================

deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | base64 -d > /tmp/deploy_key
    - chmod 600 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Sync konfigurasi ke server jika menggunakan file .env
    - cat "$PRODUCTION_ENV" | ssh $SSH_USER@$SSH_HOST "mkdir -p /opt/chat-api/production && cat > /opt/chat-api/production/.env"
    - |
      ssh $SSH_USER@$SSH_HOST "
        echo '$CI_REGISTRY_PASSWORD' | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin &&
        docker pull $IMAGE_NAME:production &&
        docker stop chat-api-production || true &&
        docker rm chat-api-production || true &&
        docker run -d \
          --name chat-api-production \
          --restart unless-stopped \
          --env-file /opt/chat-api/production/.env \
          -e ASPNETCORE_ENVIRONMENT=Production \
          -p 5001:8080 \
          $IMAGE_NAME:production &&
        docker network connect nginx_default chat-api-production || true &&
        docker network connect redis-stack_default chat-api-production || true &&
        docker network connect db_default chat-api-production || true &&
        docker image prune -f
      "
  only:
    - main
  environment:
    name: production

deploy-dev:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | base64 -d > /tmp/deploy_key
    - chmod 600 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Sync konfigurasi ke server jika menggunakan file .env
    - cat "$DEV_ENV" | ssh $SSH_USER@$SSH_HOST "mkdir -p /opt/chat-api/dev && cat > /opt/chat-api/dev/.env"
    - |
      ssh $SSH_USER@$SSH_HOST "
        echo '$CI_REGISTRY_PASSWORD' | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin &&
        docker pull $IMAGE_NAME:dev &&
        docker stop chat-api-dev || true &&
        docker rm chat-api-dev || true &&
        docker run -d \
          --name chat-api-dev \
          --restart unless-stopped \
          --env-file /opt/chat-api/dev/.env \
          -e ASPNETCORE_ENVIRONMENT=Development \
          -p 5002:8080 \
          $IMAGE_NAME:dev &&
        docker network connect nginx_default chat-api-dev || true &&
        docker network connect redis-stack_default chat-api-dev || true &&
        docker network connect db_default chat-api-dev || true &&
        docker image prune -f
      "
  only:
    - staging
  environment:
    name: dev